---
layout: default
---

<article class="post">
  {%- if page.trans_link -%}
    <p class="language-switch"><a href={{ page.trans_link }}>English</a> | 中文</p>
  {%- endif -%}

  <header class="post-header">
    <h1 class="post-title page-title-centered">{{ page.title | escape }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
