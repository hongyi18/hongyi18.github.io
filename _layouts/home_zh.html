---
layout: default
---

<div class="home">
  {%- if page.trans_link -%}
    <p class="language-switch"><a href={{ page.trans_link }}>English</a> | 中文</p>
  {%- endif -%}

  {%- if page.title and page.hide_title != true -%}
    <h1 class="page-heading">{{ page.title }}</h1>
  {%- endif -%}

  <div class="post-content">
    {{ content }}
  </div>

</div>
