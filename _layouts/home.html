---
layout: default
---

<div class="home">
  {%- if page.title and page.hide_title != true -%}
    <h1 class="page-heading">{{ page.title }}</h1>
  {%- endif -%}

  <div class="post-content">
    {{ content }}
  </div>

  {% if site.paginate %}
    {% assign posts = paginator.posts %}
  {% else %}
    {% assign posts = site.posts %}
  {% endif %}


</div>
